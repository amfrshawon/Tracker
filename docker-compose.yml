services:
  postgres:
    image: postgres:16-alpine
    container_name: tracer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tracer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tracer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tracer_postgres_data:
